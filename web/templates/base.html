<!-- web/templates/base.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shELF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1117;
            color: #e6edf3;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
        }

        header {
            padding: 20px 40px;
            border-bottom: 1px solid #21262d;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 {
            font-size: 1.4rem;
            color: #58a6ff;
            letter-spacing: 2px;
        }

        header span {
            color: #8b949e;
            font-size: 0.85rem;
        }

        main {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>shELF</h1>
        <span>static interpreter hunter</span>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
